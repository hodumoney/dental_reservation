/* 진료 시간: 09:00~16:30, 점심 11:30~13:30 제외, 30분 슬롯 (마지막 시작 16:00) */
const buildSlots = () => {
  const am = [],
    pm = [],
    all = [];
  for (let m = 9 * 60; m <= 16 * 60; m += 30) {
    const isLunch = m >= 11 * 60 + 30 && m < 13 * 60 + 30;
    const s = `${String(Math.floor(m / 60)).padStart(2, "0")}:${String(m % 60).padStart(2, "0")}`;
    if (!isLunch) {
      (m < 12 * 60 ? am : pm).push(s);
      all.push(s);
    }
  }
  return {
    am,
    pm,
    all
  };
};
const SLOTS = buildSlots();

/* ══════════ 날짜 유틸 ══════════ */
const iso = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
const today = new Date();
const parseISO = s => {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
};
const DOW = ["일", "월", "화", "수", "목", "금", "토"];
const krDate = s => {
  const d = parseISO(s);
  return `${d.getMonth() + 1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;
};
const shiftDate = (ds, delta) => {
  const d = parseISO(ds);
  d.setDate(d.getDate() + delta);
  return iso(d);
};
const startOfWeekMon = ds => {
  const d = parseISO(ds);
  const dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  return iso(d);
};
const fmtPhone = v => {
  const n = v.replace(/[^0-9]/g, "").slice(0, 11);
  if (n.length < 4) return n;
  if (n.length < 8) return `${n.slice(0, 3)}-${n.slice(3)}`;
  return `${n.slice(0, 3)}-${n.slice(3, 7)}-${n.slice(7)}`;
};

// 술식 1개(proc 객체 또는 구 item)의 표기
const oneProc = p => {
  if (!p) return "";
  if (p.proc === "직접입력") return p.custom ? p.custom : "직접입력";
  if (p.proc === "x-ray 촬영") {
    const kinds = p.kinds && p.kinds.length ? p.kinds.join("·") : null;
    return ["x-ray 촬영", kinds, p.step].filter(Boolean).join(" ");
  }
  if (p.steps && p.steps.length) return `${p.proc} ${p.steps.join("·")}`;
  return p.step ? `${p.proc} ${p.step}` : p.proc;
};
const procFull = it => {
  // 신 구조: procs[] 다중 술식
  if (it.procs && it.procs.length) return it.procs.map(oneProc).join(", ");
  // 구 구조 호환
  if (it.proc === "수술") return it.steps && it.steps.length ? it.steps.join("·") : "수술";
  return oneProc(it);
};
// 부위 표기: 아치(전악/상악/하악/턱관절) 우선, 없으면 치식. 체크(검진·x-ray)는 부위 생략
const areaLabel = it => it.cat === "체크" ? "" : it.arch ? it.arch : it.teeth.length ? `#${it.teeth.join(" #")}` : "";
const itemLabel = it => {
  const a = areaLabel(it);
  return a ? `${a} ${procFull(it)}` : procFull(it);
};

const firstTime = a => [...(a.times || [])].map(hhmm).filter(Boolean).sort()[0] || "";
// 어떤 값이 와도 "HH:MM" 로 정규화 (시트에서 시간 셀이 Date로 오는 경우 방어)
function hhmm(v) {
  if (v == null) return "";
  if (typeof v === "string") {
    const m = v.match(/(\d{1,2}):(\d{2})/);
    if (m) return `${m[1].padStart(2, "0")}:${m[2]}`;
    // "Sat Dec 30 1899 09:00:00 …" 같은 Date 문자열도 위 정규식이 잡음
    return "";
  }
  try {
    const d = new Date(v);
    if (!isNaN(d)) return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  } catch (e) {}
  return "";
}
// 예약의 시간들을 정규화한 배열
const normTimes = a => [...(a.times || [])].map(hhmm).filter(Boolean).sort();
const sortAppts = a => [...a].sort((x, y) => firstTime(x) !== firstTime(y) ? firstTime(x).localeCompare(firstTime(y)) : String(x.id).localeCompare(String(y.id)));

/* ══════════ 시트 연동 (Google Apps Script 웹앱) ══════════ */
const CFG_KEY = "clinic_sheet_cfg";
// 기본 연결값 (설정을 따로 저장하지 않아도 자동 연결)
const DEFAULT_CFG = {
  url: "https://script.google.com/macros/s/AKfycbz391L7TZVmHdN1vwaqz1HnAKmkz1NVIGepdrlJOedjBMRcQ2QEQeRVkfwvFlgTenb24w/exec",
  token: "0418"
};
function loadCfg() {
  try {
    const s = window.localStorage.getItem(CFG_KEY);
    if (s) return JSON.parse(s); // 사용자가 설정에서 바꾼 값이 있으면 우선
  } catch (e) {}
  return DEFAULT_CFG.url ? {
    ...DEFAULT_CFG
  } : null; // 없으면 기본값으로 자동 연결
}
function saveCfg(cfg) {
  try {
    window.localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  } catch (e) {}
}
// GET: 전체 데이터 조회
async function apiGet(cfg) {
  const url = cfg.url + (cfg.url.indexOf("?") >= 0 ? "&" : "?") + "token=" + encodeURIComponent(cfg.token || "");
  const res = await fetch(url, {
    method: "GET"
  });
  return await res.json();
}
// POST: 쓰기 (Apps Script는 text/plain 로 받아야 CORS 프리플라이트를 피함)
async function apiPost(cfg, payload) {
  const res = await fetch(cfg.url, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      ...payload,
      token: cfg.token || ""
    })
  });
  return await res.json();
}

/* ══════════════════════════════════════════════ */
function ClinicApp() {
  const [tab, setTab] = useState(0);
  const [appts, setAppts] = useState(seed);
  const [dayStatus, setDayStatus] = useState({}); // { "2026-07-18": "신환", ... }
  const [selDate, setSelDate] = useState(T);
  const [prefill, setPrefill] = useState(null);
  const [toast, setToast] = useState(null);
  const toastRef = useRef(null);
  const dragId = useRef(null);

  // ── 시트 연동 설정 ──
  const [cfg, setCfg] = useState(() => loadCfg()); // { url, token }
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [syncState, setSyncState] = useState("local"); // local | loading | ok | error | saving
  const connected = !!(cfg && cfg.url);

  // 자동 갱신을 잠시 멈춰야 하는 상황(모달/폼 편집 중)을 추적
  const busyRef = useRef(false);
  const setBusy = v => {
    busyRef.current = v;
  };
  // 서버로 보냈지만 아직 확정 안 된 내 변경들 (id -> appt | {__deleted:true})
  const pendingRef = useRef({});
  const pendingDayRef = useRef({}); // 일별상태 대기분 (date -> status|"")

  const showToast = m => {
    clearTimeout(toastRef.current);
    setToast(m);
    toastRef.current = setTimeout(() => setToast(null), 2600);
  };

  // 서버 데이터에 "내 대기 변경"을 덮어씌워 병합 (입력분 보존)
  const mergePending = serverAppts => {
    const pend = pendingRef.current;
    const map = {};
    (serverAppts || []).forEach(a => {
      map[String(a.id)] = a;
    });
    Object.keys(pend).forEach(id => {
      const v = pend[id];
      if (v && v.__deleted) delete map[id];else if (v) map[id] = v; // 내 최신 로컬본 우선
    });
    return Object.values(map);
  };
  const mergePendingDay = serverDay => {
    const out = {
      ...(serverDay || {})
    };
    const pd = pendingDayRef.current;
    Object.keys(pd).forEach(d => {
      const s = pd[d];
      if (s) out[d] = s;else delete out[d];
    });
    return out;
  };

  // 서버에서 전체 데이터 불러오기 (편집 중이면 건너뜀)
  const pull = useCallback(async ({
    force
  } = {}) => {
    if (!cfg || !cfg.url) return;
    if (busyRef.current && !force) return; // 입력/편집 중엔 화면 덮어쓰지 않음
    try {
      const data = await apiGet(cfg);
      if (data && data.ok) {
        setAppts(mergePending(Array.isArray(data.appts) ? data.appts : []));
        setDayStatus(mergePendingDay(data.dayStatus || {}));
        setSyncState(Object.keys(pendingRef.current).length ? "saving" : "ok");
      } else {
        setSyncState("error");
      }
    } catch (e) {
      setSyncState("error");
    }
  }, [cfg]);

  // 최초/설정변경 시 로드 + 주기적 동기화(15초)
  useEffect(() => {
    if (!cfg || !cfg.url) {
      setSyncState("local");
      return;
    }
    setSyncState("loading");
    pull({
      force: true
    });
    const t = setInterval(() => pull(), 15000);
    return () => clearInterval(t);
  }, [cfg, pull]);

  // 서버 쓰기 헬퍼: 대기목록에 올리고, 성공하면 확정(대기 해제)
  const push = async payload => {
    if (!cfg || !cfg.url) return {
      ok: true
    }; // 로컬 모드
    // 대기 등록
    if (payload.action === "add" || payload.action === "update") {
      pendingRef.current[String(payload.appt.id)] = payload.appt;
    } else if (payload.action === "cancel" || payload.action === "delete") {
      pendingRef.current[String(payload.id)] = {
        __deleted: true
      };
    } else if (payload.action === "setDayStatus") {
      pendingDayRef.current[payload.date] = payload.status || "";
    }
    setSyncState("saving");
    try {
      const r = await apiPost(cfg, payload);
      if (!r || !r.ok) {
        if (r && r.error === "capacity") showToast("그 시간대는 이미 3명이라 저장되지 않았어요");else showToast("시트 저장에 실패했어요 (다시 시도해 주세요)");
        // 실패분은 대기에서 제거하고 서버 상태로 되돌림
        clearPending(payload);
        setSyncState("error");
        pull({
          force: true
        });
        return r || {
          ok: false
        };
      }
      // 성공 → 대기 해제
      clearPending(payload);
      setSyncState(Object.keys(pendingRef.current).length ? "saving" : "ok");
      return r;
    } catch (e) {
      showToast("시트 연결에 실패했어요 (네트워크 확인)");
      clearPending(payload);
      setSyncState("error");
      return {
        ok: false
      };
    }
  };
  const clearPending = payload => {
    if (payload.action === "add" || payload.action === "update") delete pendingRef.current[String(payload.appt.id)];else if (payload.action === "cancel" || payload.action === "delete") delete pendingRef.current[String(payload.id)];else if (payload.action === "setDayStatus") delete pendingDayRef.current[payload.date];
  };

  // 편집 중 자동 갱신 정지: 환자등록 탭 열림 / 설정 열림 / 일별예약 카드 모달 열림
  const [dayEditing, setDayEditing] = useState(false);
  useEffect(() => {
    setBusy(settingsOpen || tab === 2 || dayEditing);
  }, [settingsOpen, tab, dayEditing]);
  const addAppt = a => {
    const item = {
      ...a,
      id: a.id || uid(),
      surgery: a.items.some(i => i.cat === "수술"),
      attended: false,
      attendMarked: false,
      cancelled: false,
      sent: "",
      careSent: ""
    };
    setAppts(p => [...p, item]);
    push({
      action: "add",
      appt: item
    });
    return item;
  };
  const updateAppt = (id, patch) => {
    const cur = appts.find(a => a.id === id);
    if (!cur) return;
    const nextItems = patch.items || cur.items;
    const updated = {
